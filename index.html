<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gold Trading Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px;
    }
    .calculator {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      max-width: 400px;
      width: 100%;
    }
    h2 { text-align: center; }
    .row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    label { flex: 1; padding-right: 10px; }
    input {
      flex: 1;
      padding: 6px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover { background: #0056b3; }
    .result { margin-top: 20px; padding: 10px; background: #e2f0ff; border-radius: 8px; }
  </style>
</head>
<body>

<div class="calculator">
  <h2>Gold Trading Calculator</h2>

  <div class="row">
    <label for="totalEquity">Total Equity ($):</label>
    <input type="number" id="totalEquity" placeholder="3000">
  </div>

  <div class="row">
    <label for="previousLot">Previous Lot Size:</label>
    <input type="number" id="previousLot" placeholder="0.01">
  </div>

  <div class="row">
    <label for="lastProfit">Last Trade Profit ($):</label>
    <input type="number" id="lastProfit" placeholder="0">
  </div>

  <div class="row">
    <label for="stopLoss">Stop Loss (pips):</label>
    <input type="number" id="stopLoss" placeholder="20">
  </div>

  <div class="row">
    <label for="pipValue">Gold Pip Value:</label>
    <input type="number" id="pipValue" value="1" placeholder="1">
  </div>

  <button onclick="calculateLot()">Calculate Next Lot</button>

  <div class="result" id="result">
    Your results will appear here.
  </div>
</div>

<script>
function calculateLot() {
  let totalEquity = parseFloat(document.getElementById('totalEquity').value) || 0;
  let previousLot = parseFloat(document.getElementById('previousLot').value) || 0;
  let lastProfit = parseFloat(document.getElementById('lastProfit').value) || 0;
  let stopLoss = parseFloat(document.getElementById('stopLoss').value) || 0;
  let pipValue = parseFloat(document.getElementById('pipValue').value) || 1;

  // Risk 1% of equity by default
  let riskPerTrade = totalEquity * 0.01;

  // Next Lot calculation
  let nextLot = (riskPerTrade / (stopLoss * pipValue)) + previousLot;
  let newEquity = totalEquity + lastProfit;

  document.getElementById('result').innerHTML = `
    <b>Next Lot Size:</b> ${nextLot.toFixed(2)}<br>
    <b>New Equity After Trade:</b> $${newEquity.toFixed(2)}
  `;
}
</script>

</body>
</html>
